# =========================
# Font
# =========================
font_family JetBrainsMono Nerd Font
font_size 12.0
line_height 1.1

# =========================
# Window appearance
# =========================
confirm_os_window_close 0
background_opacity 1.0
draw_minimal_borders no
window_border_width 0
window_padding_width 0
hide_window_decorations yes
# window_decorations none


# =========================
# Scrollback
# =========================
scrollback_lines 10000

# =========================
# Cursor
# =========================
cursor_shape block
cursor_blink_interval 0

# =========================
# Tabs
# =========================
tab_bar_edge top
tab_bar_style powerline 

# =========================
# Keybindings (Vim-safe)
# =========================

# New tab
map ctrl+alt+t new_tab

# Close tab
map ctrl+alt+w close_tab

# Next / previous tab
map ctrl+alt+right next_tab
map ctrl+alt+left previous_tab

# Split windows
map ctrl+alt+v launch --location=vsplit
map ctrl+alt+h launch --location=hsplit

# Move focus between splits
map ctrl+alt+up neighboring_window up
map ctrl+alt+down neighboring_window down
map ctrl+alt+left neighboring_window left
map ctrl+alt+right neighboring_window right

# Resize splits
map ctrl+alt+shift+up resize_window taller 5
map ctrl+alt+shift+down resize_window shorter 5
map ctrl+alt+shift+left resize_window narrower 5
map ctrl+alt+shift+right resize_window wider 5

# Clipboard
map ctrl+alt+c copy_to_clipboard
map ctrl+alt+p paste_from_clipboard

# Open URL
map ctrl+alt+o open_url_with_default_program
# ~/.config/kitty/kitty.conf

# === Background / Foreground ===
background #1e1e1e
foreground #afafaf
cursor     #afafaf

# === Selection / Highlights ===
selection_background #5f875f
selection_foreground #000000

# === Tabs / Status bar (optional) ===
active_tab_background   #5f875f
active_tab_foreground   #000000
inactive_tab_background #626262
inactive_tab_foreground #afafaf

# === Other Settings ===
bold_brightens_ansi_colors yes

shell /bin/bash
